            <form class="form">
              <div class="form-row">
                <div class="form-group">
                  <label>FACEBOOK NAME <span>*</span></label>
                  <input placeholder="Enter your Facebook name" />
                </div>
                <div class="form-group">
                  <label>PHONE NUMBER (optional)</label>
                  <input placeholder="E.g.: 0912 345 678" />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>GAME <span>*</span></label>
                  <select id="game-select" required>
                    <option value="">-- Select game --</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>ACCOUNT TYPE <span>*</span></label>
                  <select id="login-select" required>
                    <option>-- Select login gateway --</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label>SERVER <span>*</span></label>
                <input placeholder="E.g.: S1, S15, Asia" required />
              </div>
              <div class="form-group">
                <label>CHARACTER ID <span>*</span></label>
                <input placeholder="Enter your in-game character ID" required />
              </div>
              <div class="form-group">
                <label>TOP-UP PACKAGE 1 <span>*</span></label>
                <select id="package-1-select" required>
                  <option>Select package</option>
                </select>
              </div>
              <div class="form-group">
                <label>TOP-UP PACKAGE 2</label>
                <select id="package-2-select">
                  <option>Select package</option>
                </select>
              </div>
              <div class="form-group">
                <label>OTHER PACKAGE (if any)</label>
                <input
                  placeholder="Enter additional package you want to top-up"
                />
              </div>
              <button type="submit" class="btn-submit MS__hover">
                <img
                  src="../assets/web-header/images/button-en.png"
                  alt="Submit"
                />
              </button>
            </form>
