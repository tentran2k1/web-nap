    <script>
			(function () {
				var bannerLoading = document.querySelector('.banner-loading');
				var btnClose = document.getElementById('banner-loading-close');
				var redirectTimer;

				function closeBanner() {
				if (bannerLoading) 
				bannerLoading.classList.remove('active');

				clearTimeout(redirectTimer);
				}

				if (btnClose) {
				btnClose.addEventListener('click', closeBanner);
				}

				var opacity = bannerLoading ? bannerLoading.querySelector('.opacity') : null;
				if (opacity) {
				opacity.addEventListener('click', closeBanner);
				}

				if (bannerLoading) {
				redirectTimer = setTimeout(function () {
				window.location.href = 'https://lightandnight.vnggames.com/coming-soon';
				}, 3000);
				}

				var bannerImage = document.getElementById('banner-loading-image');
				if (! bannerImage) 
				return;


				var locate = 'VN';
				var randomFrame = Math.floor(Math.random() * 5) + 1;
				bannerImage.src = 'assets/web-header/images/loading/LAN-2-' + locate + '-' + randomFrame + '.png';
				})();
		</script>
